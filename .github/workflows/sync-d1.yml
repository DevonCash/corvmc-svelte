name: Sync D1 from Postgres

# PRE-CUTOVER ONLY. Refreshes staging D1 data from the canonical DigitalOcean Postgres.
# Schema migrations run in the Workers Builds deploy (scripts/ci-migrate.mjs); this job
# only reloads data. Remove this workflow at cutover (see docs/deployment-checklist.md).

on:
  schedule:
    - cron: '0 9 * * *' # nightly ~01:00–02:00 America/Los_Angeles
  workflow_dispatch: {} # manual "Run workflow" button

# Don't let a long sync overlap the next scheduled one.
concurrency:
  group: sync-d1
  cancel-in-progress: false

jobs:
  sync:
    name: Reload D1 data
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_DATABASE_ID: ${{ secrets.CLOUDFLARE_DATABASE_ID }}
      CLOUDFLARE_D1_TOKEN: ${{ secrets.CLOUDFLARE_D1_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Apply pending schema migrations to remote
        run: pnpm db:migrate
      - name: Reload data from Postgres
        run: bash scripts/sync-d1.sh

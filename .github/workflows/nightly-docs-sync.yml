name: Nightly Docs Sync

# Mechanically detects whether documentation has drifted from the day's code
# changes, and only then invokes Claude to update the affected docs and open a PR.
#
# Detection (deterministic, no LLM):
#   - relevant source files changed since the last sync (git diff vs the
#     `docs-sync-last` tag), AND/OR
#   - route inventory drift + help-content integrity (scripts/docs/check-docs-drift.mjs).
# If neither fires, the job exits without calling the model.
#
# One-time setup required before this works:
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#      (or run `/install-github-app` from a Claude Code CLI session).
#   2. Add an `ANTHROPIC_API_KEY` repository secret
#      (Settings -> Secrets and variables -> Actions).
#
# Notes:
#   - Scheduled workflows only fire from the copy of this file on the DEFAULT
#     branch, so this must be merged to `main` before the nightly run starts.
#   - GitHub cron is UTC and does NOT observe DST. `0 10 * * *` is 03:00 Pacific
#     during PDT (summer) and 02:00 Pacific during PST (winter).
#   - GitHub auto-pauses scheduled workflows after 60 days of repo inactivity.

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-docs-sync
  cancel-in-progress: false

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so we can diff against the last sync

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # --- Deterministic detection -------------------------------------------
      - name: Detect docs drift
        id: detect
        run: |
          set -uo pipefail

          # Baseline = the commit we last evaluated (a moving tag). Falls back to
          # a ~26h window on the very first run, before the tag exists.
          BASE="$(git rev-parse -q --verify refs/tags/docs-sync-last || true)"
          PATHS="src/routes src/lib/server src/lib/components scripts/seed-dev.ts"
          if [ -n "$BASE" ]; then
            echo "Baseline: docs-sync-last ($BASE)"
            CHANGED="$(git diff --name-only "$BASE" HEAD -- $PATHS)"
          else
            echo "No docs-sync-last tag yet — using a 26h window."
            CHANGED="$(git log --since='26 hours ago' --name-only --pretty=format: -- $PATHS | sort -u | sed '/^$/d')"
          fi
          echo "Relevant changed files:"; echo "${CHANGED:-(none)}"

          # Structural drift + integrity (compares live routes to the committed
          # snapshot; must run BEFORE regenerating the snapshot).
          set +e
          node scripts/docs/check-docs-drift.mjs
          DRIFT=$?
          set -e

          HAS_WORK=false
          if [ -n "$CHANGED" ] || [ "$DRIFT" != "0" ]; then HAS_WORK=true; fi
          echo "has_work=$HAS_WORK" >> "$GITHUB_OUTPUT"

          # Expose the changed-file list to the model step via a file.
          printf '%s\n' "$CHANGED" > changed-files.txt
          echo "evaluated_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          if [ "$HAS_WORK" = "false" ]; then
            echo "No relevant changes and no drift — skipping the model."
          fi

      # --- LLM step: only runs when detection found work ----------------------
      - name: Update docs and open PR
        if: steps.detect.outputs.has_work == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: '--max-turns 40'
          prompt: |
            Documentation may have drifted from recent code changes. A deterministic detector has already run — use its output as your worklist. Update only the docs that genuinely drifted, then open a documentation-only pull request. If, after reading the inputs and the actual code, nothing genuinely needs a docs change, make no commit and no PR.

            ## Inputs already computed for you
            - `docs-drift-report.json` — JSON with `integrityErrors`, `routeAdded`, `routeRemoved`, `articleCount`. Generated by `scripts/docs/check-docs-drift.mjs`.
            - `changed-files.txt` — the relevant source files changed since the last sync (under `src/routes/`, `src/lib/server/`, `src/lib/components/`, `scripts/seed-dev.ts`).
            Read both first. They tell you WHERE to look; you still decide whether the user-facing behavior actually changed.

            ## Environment
            GitHub Actions on `main`, full checkout, deps installed. SvelteKit / TypeScript / pnpm. Use `gh` for the PR.

            ## What the docs are
            - `docs/manual/README.md` — the user-manual MANIFEST (~76 articles across public/member/band/staff, tagged `[P]` page-level or `[H]` how-to). Source of truth for coverage.
            - In-app help articles: `src/content/help/<category-slug>/<article-slug>.md` with YAML frontmatter (`title`, `slug`, `category`, `summary`, `minRole` = member|staff|admin, `sortOrder`) + CommonMark body. Categories are defined in `scripts/seed-dev.ts`.
            - Public-site how-tos: `docs/manual/public/*.md` (markdown only — `/member/help` is behind member auth).
            - `docs/reports/parity-report.md` — feature parity vs. the legacy Laravel app.
            - `docs/manual/route-inventory.json` — the committed route snapshot the detector diffs against.

            ## How to act on each signal
            - `routeAdded` — a page exists with no doc. Read the new route's `+page.svelte` / `data.remote.ts` to learn what it does, then add the appropriate article(s) under `src/content/help/` (or `docs/manual/public/`) AND a checklist entry in `docs/manual/README.md`. If it needs a new help category, add it to both the manifest and the category list in `scripts/seed-dev.ts`.
            - `routeRemoved` — a documented page is gone. Remove or revise the stale article(s), its manifest entry, and any internal links pointing at it.
            - `changed-files.txt` — for changed existing pages, read the actual code to see if a documented workflow changed; update the matching article only if it did.
            - `integrityErrors` — fix these (broken internal `/member/help/<slug>` links, duplicate slugs, bad frontmatter, a seeded `static` slug with no backing file).
            - Do not invent specifics (prices, durations, limits) you cannot verify in code/config; keep wording general when unsure. Match the existing concise, second-person, step-numbered voice with a short "Related" list.

            ## Before opening the PR
            1. Regenerate the route snapshot: `pnpm docs:routes` (commit the updated `docs/manual/route-inventory.json`).
            2. Run `pnpm docs:check` and confirm it exits clean (no integrity errors, no remaining drift).
            3. Run `pnpm check` (svelte-check) and confirm no NEW type errors in files you touched.
            4. Do NOT run `pnpm help:sync` — it needs a D1 database not available on the runner; `pnpm docs:check` is the gate.

            ## Open the PR
            Only if you changed files: branch `docs/nightly-sync-$(date +%Y-%m-%d)`, commit (descriptive message, NO co-author/sign-off lines, do not mention being an AI), push, and `gh pr create` against `main`. The PR body must list, per doc touched, what changed and which route/commit prompted it. Print the PR URL. If nothing needed changing, print a one-line summary and exit without a PR.

            ## Constraints
            - Branch off `main`; never commit docs changes directly to `main`.
            - Documentation-only PR — do not modify application code (other than help categories in `scripts/seed-dev.ts` when a new category is genuinely required, plus the route snapshot).
            - No interface gradients; no co-author lines (project conventions).

      # --- Advance the baseline so the next run diffs from here ----------------
      - name: Advance sync marker
        if: success()
        run: |
          git tag -f docs-sync-last "${{ steps.detect.outputs.evaluated_sha }}"
          git push -f origin docs-sync-last

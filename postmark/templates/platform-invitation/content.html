<p style="margin: 0 0 16px; font-size: 18px; font-weight: 600; line-height: 1.4; color: #111827">
  You've been invited to join a band!
</p>
<p style="margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #374151">
  <strong>{{invitedByName}}</strong> has invited you to join <strong>{{bandName}}</strong> as a
  {{role}} on CorvMC.
</p>
<p style="margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #374151">
  CorvMC is a community music space where bands book rehearsals, manage equipment, and coordinate
  with their members.
</p>
<table role="presentation" cellpadding="0" cellspacing="0" style="margin: 8px 0">
  <tr>
    <td style="border-radius: 6px; background: #6366f1">
      <a
        href="{{signupUrl}}"
        target="_blank"
        style="display: inline-block; padding: 11px 22px; font-size: 15px; font-weight: 600; color: #ffffff; text-decoration: none; border-radius: 6px"
        >Create Account &amp; Join</a
      >
    </td>
  </tr>
</table>
<p style="margin: 16px 0 0; font-size: 12px; line-height: 1.5; color: #888888">
  This invitation expires in 7 days.
</p>

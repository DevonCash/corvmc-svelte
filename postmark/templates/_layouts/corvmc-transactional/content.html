<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <body style="margin: 0; padding: 0; background: #f3f4f6">
    <span
      style="display: none !important; visibility: hidden; opacity: 0; color: transparent; height: 0; width: 0; overflow: hidden; mso-hide: all"
      >{{preview_text}}</span
    >
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background: #f3f4f6">
      <tr>
        <td align="center" style="padding: 20px 12px">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width: 560px">
            <tr>
              <td
                align="center"
                style="padding: 8px 0 16px; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 22px; font-weight: 700; color: #111827"
              >
                CorvMC
              </td>
            </tr>
            <tr>
              <td
                style="background: #ffffff; border-radius: 8px; padding: 32px 24px; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif"
              >
                {{{@content}}}
              </td>
            </tr>
            <tr>
              <td
                align="center"
                style="padding: 16px 8px; font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; font-size: 12px; color: #9ca3af"
              >
                You're receiving this because of your notification preferences.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>

{{#heading}}
<p style="margin: 0 0 16px; font-size: 18px; font-weight: 600; line-height: 1.4; color: #111827">
  {{heading}}
</p>
{{/heading}}
{{#greeting}}
<p style="margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #374151">{{greeting}}</p>
{{/greeting}}
{{#paragraphs}}
<p style="margin: 0 0 16px; font-size: 15px; line-height: 1.6; color: #374151">{{{text}}}</p>
{{/paragraphs}}
{{#details}}
<p style="margin: 0 0 8px; font-size: 15px; line-height: 1.6; color: #374151">
  <strong>{{label}}:</strong> {{value}}
</p>
{{/details}}
{{#cta}}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin: 16px 0 8px">
  <tr>
    <td style="border-radius: 6px; background: #6366f1">
      <a
        href="{{url}}"
        target="_blank"
        style="display: inline-block; padding: 11px 22px; font-size: 15px; font-weight: 600; color: #ffffff; text-decoration: none; border-radius: 6px"
        >{{label}}</a
      >
    </td>
  </tr>
</table>
{{/cta}}
{{#footnote}}
<p style="margin: 16px 0 0; font-size: 13px; line-height: 1.5; color: #9ca3af">{{footnote}}</p>
{{/footnote}}

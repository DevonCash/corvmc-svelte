<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Radii</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap");
:root {
  --cmc-orange: #e5771e;
  --cmc-yellow: #ffe28a;
  --cmc-goldenrod: #ffb500;
  --cmc-red-orange: #f84d13;
  --cmc-navy: #003b5c;
  --cmc-teal: #00859b;
  --cmc-light-blue: #b8dde1;
  --cmc-brown: #5a3d2b;
  --cmc-cream: #fffbf6;
  --cmc-parchment: #ffe2cd;
  --cmc-aged-paper: #ecdfc4;
  --fg: #1a2330;
  --fg-2: #4a5563;
  --fg-3: #7a8290;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: "Lexend", system-ui, sans-serif;
  background: var(--cmc-cream);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.card {
  padding: 20px 24px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row { display: flex; gap: 14px; align-items: stretch; }
.tri-stripe {
  height: 10px;
  background: linear-gradient(
    to bottom,
    var(--cmc-teal) 0 33.333%,
    var(--cmc-goldenrod) 33.333% 66.666%,
    var(--cmc-red-orange) 66.666% 100%
  );
}
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
</style>
</head>
<body><div class="card">
  <div class="row" style="flex:1; align-items:flex-end;">
    
      <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="background:var(--cmc-light-blue); width:84px; height:64px; border-radius:4px; border:1px solid rgba(0,0,0,.08);"></div>
        <div style="font-weight:600; font-size:12px;">sm</div>
        <div style="font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2);">4px</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="background:var(--cmc-light-blue); width:84px; height:64px; border-radius:8px; border:1px solid rgba(0,0,0,.08);"></div>
        <div style="font-weight:600; font-size:12px;">default</div>
        <div style="font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2);">8px</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="background:var(--cmc-light-blue); width:84px; height:64px; border-radius:12px; border:1px solid rgba(0,0,0,.08);"></div>
        <div style="font-weight:600; font-size:12px;">md</div>
        <div style="font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2);">12px</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="background:var(--cmc-light-blue); width:84px; height:64px; border-radius:16px; border:1px solid rgba(0,0,0,.08);"></div>
        <div style="font-weight:600; font-size:12px;">lg</div>
        <div style="font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2);">16px</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; gap:8px; align-items:center;">
        <div style="background:var(--cmc-light-blue); width:84px; height:64px; border-radius:9999px; border:1px solid rgba(0,0,0,.08);"></div>
        <div style="font-weight:600; font-size:12px;">pill</div>
        <div style="font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2);">9999px</div>
      </div>
  </div></div></body>
</html>

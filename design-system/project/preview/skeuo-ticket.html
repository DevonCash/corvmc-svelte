<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ticket stub</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Permanent+Marker&family=Caveat:wght@500;600;700&display=swap");

* { box-sizing: border-box; }
:root {
  --font-chalk:  "Permanent Marker", "Lexend", system-ui, sans-serif;
  --font-script: "Caveat", "Permanent Marker", cursive;
}
html, body {
  margin: 0; padding: 0;
  font-family: "Lexend", system-ui, sans-serif;
  background: #161b22;
  color: #e6dcd0;
  -webkit-font-smoothing: antialiased;
}
.card {
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.bar {
  padding: 14px 22px;
  background: #1d232c;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.bar__label {
  font-family: ui-monospace, Menlo, monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #828a98;
  flex-shrink: 0;
}
.bar__title {
  font-family: "Lexend", sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: #e6dcd0;
  flex: 1;
}
.bar__select {
  appearance: none;
  -webkit-appearance: none;
  background: #262d38;
  color: #e6dcd0;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 5px;
  padding: 6px 28px 6px 12px;
  font-family: "Lexend", sans-serif;
  font-size: 12px;
  cursor: pointer;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%23ff8c42' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
}
.bar__select:focus { outline: 1px solid #ff8c42; outline-offset: 1px; }
.stages {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 0;
}
.stage {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 28px;
  position: relative;
}
.stage--house { background: #fffbf6; }
.stage--back  { background: #161b22; }
.stage__label {
  position: absolute;
  top: 10px;
  left: 14px;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.stage--house .stage__label { color: rgba(0,0,0,0.35); }
.stage--back  .stage__label { color: rgba(255,255,255,0.3); }


.ticket {
  position: relative; display: flex; width: 240px;
  border-radius: 3px; color: #1a1410;
  transform: rotate(-2deg);
  background: transparent;
  cursor: pointer;
}
.ticket__main {
  flex: 1;
  padding: 12px 12px 10px 14px;
  display: flex; flex-direction: column; gap: 3px;
  background: #edc46a;
  border-radius: 3px 0 0 3px;
  /* Sawtooth on right edge — covered by perf line at rest, revealed on tear */
  clip-path: polygon(
    0 0, 100% 0,
    97% 5%, 100% 10%, 97% 15%, 100% 20%, 97% 25%, 100% 30%,
    97% 35%, 100% 40%, 97% 45%, 100% 50%, 97% 55%, 100% 60%,
    97% 65%, 100% 70%, 97% 75%, 100% 80%, 97% 85%, 100% 90%,
    97% 95%, 100% 100%,
    0 100%
  );
}
.ticket__eyebrow {
  font-family: ui-monospace, Menlo, monospace; font-size: 8px;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: #c63015; font-weight: 700;
}
.ticket__title {
  font-family: var(--font-chalk); font-size: 19px;
  line-height: 0.95; color: #1a1410; margin: 4px 0; letter-spacing: 0.01em;
}
.ticket__when { font-family: var(--font-script); font-size: 15px; font-weight: 700; color: #1a1410; line-height: 1.05; margin: 0; }
.ticket__where { font-family: var(--font-script); font-size: 12px; color: rgba(26,20,16,0.72); line-height: 1.15; margin: 0; }
.ticket__price {
  margin-top: 8px; padding-top: 6px;
  border-top: 1.5px dashed rgba(26,20,16,0.4);
  display: flex; justify-content: space-between;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: #c63015;
}
.ticket__price span:last-child { color: rgba(26,20,16,0.55); }
.ticket__perf {
  width: 2px;
  background: repeating-linear-gradient(180deg, rgba(26,20,16,0.55) 0 3px, transparent 3px 6px);
  z-index: 1;
  /* Fades out as the stub tears away */
  opacity: 1;
  transition: opacity 250ms ease;
}
.ticket__stub {
  width: 42px;
  padding: 8px 0;
  display: flex;
  align-items: center; justify-content: center;
  background: #dfb04f;
  border-radius: 0 3px 3px 0;
  /* Sawtooth on left edge — mirrors the main's right tear */
  clip-path: polygon(
    3% 5%, 0 10%, 3% 15%, 0 20%, 3% 25%, 0 30%,
    3% 35%, 0 40%, 3% 45%, 0 50%, 3% 55%, 0 60%,
    3% 65%, 0 70%, 3% 75%, 0 80%, 3% 85%, 0 90%,
    3% 95%, 0 100%,
    100% 100%, 100% 0,
    0 0
  );
  transition: transform 350ms cubic-bezier(0.25, 0.7, 0.3, 1);
  transform-origin: right center;
}

/* TEAR — stub rips away and tilts on hover */
.ticket:hover .ticket__stub {
  transform: translateX(36px) rotate(7deg);
}
.ticket:hover .ticket__perf {
  opacity: 0;
}
.ticket__admit {
  font-family: "Lexend", sans-serif; font-weight: 700;
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: #c63015; writing-mode: vertical-rl; transform: rotate(180deg); line-height: 1;
}


/* Light outline on dark background */
.stage--back .ticket { filter: drop-shadow(0 0 0 rgba(255,255,255,0.4)); }
.stage--back .ticket { outline: 1px solid rgba(255,255,255,0.08); outline-offset: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="bar">
    <span class="bar__label">Events</span>
    <span class="bar__title">Ticket stub</span>
    <select id="variant" class="bar__select"><option value="0">Cassette Showcase</option><option value="1">Real Book Club</option><option value="2">Open House</option></select>
  </div>
  <div class="stages">
    <div class="stage stage--house">
      <span class="stage__label">Houselights</span>
      
<div class="ticket">
  <div class="ticket__main">
    <span class="ticket__eyebrow" data-slot="eyebrow">Corvallis Music Collective</span>
    <h4 class="ticket__title" data-slot="title">Cassette Showcase</h4>
    <p class="ticket__when" data-slot="when">Fri Dec 13 · 7 PM</p>
    <p class="ticket__where" data-slot="where">6775 SW Philomath</p>
    <div class="ticket__price"><span data-slot="price">$5 NOTAFLOF</span><span data-slot="doors">Doors 6:30</span></div>
  </div>
  <div class="ticket__perf"></div>
  <div class="ticket__stub"><span class="ticket__admit">Admit One</span></div>
</div>
    </div>
    <div class="stage stage--back">
      <span class="stage__label">Backstage</span>
      
<div class="ticket">
  <div class="ticket__main">
    <span class="ticket__eyebrow" data-slot="eyebrow">Corvallis Music Collective</span>
    <h4 class="ticket__title" data-slot="title">Cassette Showcase</h4>
    <p class="ticket__when" data-slot="when">Fri Dec 13 · 7 PM</p>
    <p class="ticket__where" data-slot="where">6775 SW Philomath</p>
    <div class="ticket__price"><span data-slot="price">$5 NOTAFLOF</span><span data-slot="doors">Doors 6:30</span></div>
  </div>
  <div class="ticket__perf"></div>
  <div class="ticket__stub"><span class="ticket__admit">Admit One</span></div>
</div>
    </div>
  </div>
</div>
<script>
window.__variants = [
  {
    "__name": "Cassette Showcase",
    "eyebrow": "Corvallis Music Collective",
    "title": "Cassette Showcase",
    "when": "Fri Dec 13 · 7 PM",
    "where": "6775 SW Philomath",
    "price": "$5 NOTAFLOF",
    "doors": "Doors 6:30"
  },
  {
    "__name": "Real Book Club",
    "eyebrow": "Last Thursday Monthly",
    "title": "Real Book Club",
    "when": "Thu Jan 30 · 7 PM",
    "where": "6775 SW Philomath",
    "price": "Free · NOTAFLOF",
    "doors": "All skill levels"
  },
  {
    "__name": "Open House",
    "eyebrow": "All Are Welcome",
    "title": "CMC Open House",
    "when": "Sat Feb 15 · 2-6 PM",
    "where": "6775 SW Philomath",
    "price": "Free",
    "doors": "Tours every :30"
  }
];

const v = window.__variants || [];
const sel = document.getElementById('variant');
function apply(idx) {
  const data = v[idx] || {};
  Object.keys(data).forEach(k => {
    document.querySelectorAll('[data-slot="' + k + '"]').forEach(el => {
      el.textContent = data[k];
    });
  });
  if (data.__lit !== undefined) {
    document.querySelectorAll('.pass__hours-bar').forEach(bar => {
      const total = bar.children.length;
      [...bar.children].forEach((c, i) => {
        c.classList.toggle('lit', i < data.__lit);
      });
    });
    document.querySelectorAll('.spike__lit').forEach(s => {
      s.style.width = (data.__lit) + '%';
    });
  }
}
sel.addEventListener('change', e => apply(+e.target.value));
apply(0);

</script>
</body>
</html>

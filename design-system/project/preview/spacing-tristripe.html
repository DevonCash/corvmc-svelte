<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tri-stripe usage</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap");
:root {
  --cmc-orange: #e5771e;
  --cmc-yellow: #ffe28a;
  --cmc-goldenrod: #ffb500;
  --cmc-red-orange: #f84d13;
  --cmc-navy: #003b5c;
  --cmc-teal: #00859b;
  --cmc-light-blue: #b8dde1;
  --cmc-brown: #5a3d2b;
  --cmc-cream: #fffbf6;
  --cmc-parchment: #ffe2cd;
  --cmc-aged-paper: #ecdfc4;
  --fg: #1a2330;
  --fg-2: #4a5563;
  --fg-3: #7a8290;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: "Lexend", system-ui, sans-serif;
  background: var(--cmc-cream);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.card {
  padding: 20px 24px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row { display: flex; gap: 14px; align-items: stretch; }
.tri-stripe {
  height: 10px;
  background: linear-gradient(
    to bottom,
    var(--cmc-teal) 0 33.333%,
    var(--cmc-goldenrod) 33.333% 66.666%,
    var(--cmc-red-orange) 66.666% 100%
  );
}
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
</style>
</head>
<body><div class="card">
  <div style="display:flex; flex-direction:column; gap:14px;">
    <div style="border:1px solid rgba(0,0,0,.08); border-radius:8px; overflow:hidden; background:#fff;">
      <div style="padding:14px 18px; display:flex; align-items:center; justify-content:space-between;">
        <div style="font-weight:700; color:var(--cmc-orange); font-size:16px;">Corvallis Music Collective</div>
        <div style="display:flex; gap: 14px; font-size:12px; color:var(--fg-2);">
          <span>Events</span><span>Directory</span><span>Programs</span>
        </div>
      </div>
      <div class="tri-stripe" style="height:8px;"></div>
    </div>
    <div style="font-size:11px; color:var(--fg-3);">8–12px tall, sits at the bottom of the site header on every page. The strongest brand recall device in the UI.</div>
  </div></div></body>
</html>

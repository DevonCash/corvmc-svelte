<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tri-stripe colors</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap");
:root {
  --cmc-orange: #e5771e;
  --cmc-yellow: #ffe28a;
  --cmc-goldenrod: #ffb500;
  --cmc-red-orange: #f84d13;
  --cmc-navy: #003b5c;
  --cmc-teal: #00859b;
  --cmc-light-blue: #b8dde1;
  --cmc-brown: #5a3d2b;
  --cmc-cream: #fffbf6;
  --cmc-parchment: #ffe2cd;
  --cmc-aged-paper: #ecdfc4;
  --fg: #1a2330;
  --fg-2: #4a5563;
  --fg-3: #7a8290;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: "Lexend", system-ui, sans-serif;
  background: var(--cmc-cream);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.card {
  padding: 20px 24px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row { display: flex; gap: 14px; align-items: stretch; }
.tri-stripe {
  height: 10px;
  background: linear-gradient(
    to bottom,
    var(--cmc-teal) 0 33.333%,
    var(--cmc-goldenrod) 33.333% 66.666%,
    var(--cmc-red-orange) 66.666% 100%
  );
}
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
</style>
</head>
<body><div class="card">
  <div style="display:flex; flex-direction:column; gap: 14px;">
    <div style="display:flex; gap:0; height:70px; border-radius:8px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.06);">
      <div style="flex:1; background:#00859b; display:flex; align-items:flex-end; padding:8px 10px; color:#fff; font-size:11px; font-weight:600; font-family: ui-monospace, Menlo, monospace;">#00859b</div>
      <div style="flex:1; background:#ffb500; display:flex; align-items:flex-end; padding:8px 10px; color:#5a3d2b; font-size:11px; font-weight:600; font-family: ui-monospace, Menlo, monospace;">#ffb500</div>
      <div style="flex:1; background:#f84d13; display:flex; align-items:flex-end; padding:8px 10px; color:#fff; font-size:11px; font-weight:600; font-family: ui-monospace, Menlo, monospace;">#f84d13</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div class="tri-stripe" style="border-radius:2px;"></div>
      <div style="font-size:11px; color:var(--fg-3);">Public header / footer band — 10px tall, hard stops</div>
    </div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div class="tri-stripe" style="background:linear-gradient(to bottom, #003b5c 0 33.333%, #ffb500 33.333% 66.666%, #f84d13 66.666% 100%); border-radius:2px;"></div>
      <div style="font-size:11px; color:var(--fg-3);">Admin (Filament) variant — swaps teal for navy</div>
    </div>
  </div></div></body>
</html>

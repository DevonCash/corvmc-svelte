<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reference posters</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap");
:root {
  --cmc-orange: #e5771e;
  --cmc-yellow: #ffe28a;
  --cmc-goldenrod: #ffb500;
  --cmc-red-orange: #f84d13;
  --cmc-navy: #003b5c;
  --cmc-teal: #00859b;
  --cmc-light-blue: #b8dde1;
  --cmc-brown: #5a3d2b;
  --cmc-cream: #fffbf6;
  --cmc-parchment: #ffe2cd;
  --cmc-aged-paper: #ecdfc4;
  --fg: #1a2330;
  --fg-2: #4a5563;
  --fg-3: #7a8290;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: "Lexend", system-ui, sans-serif;
  background: var(--cmc-cream);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.card {
  padding: 20px 24px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row { display: flex; gap: 14px; align-items: stretch; }
.tri-stripe {
  height: 10px;
  background: linear-gradient(
    to bottom,
    var(--cmc-teal) 0 33.333%,
    var(--cmc-goldenrod) 33.333% 66.666%,
    var(--cmc-red-orange) 66.666% 100%
  );
}
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
</style>
</head>
<body><div class="card">
  <div class="label">Real CMC event flyers · the retro-poster aesthetic</div>
  <div class="row" style="flex:1; gap:10px; overflow:hidden;">
    <div style="flex:1; height:100%; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.10);"><img src="../assets/posters/open-house.png" alt="open-house.png" style="width:100%; height:100%; object-fit:cover; display:block;"/></div><div style="flex:1; height:100%; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.10);"><img src="../assets/posters/monthly-meetup-open-jam.png" alt="monthly-meetup-open-jam.png" style="width:100%; height:100%; object-fit:cover; display:block;"/></div><div style="flex:1; height:100%; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.10);"><img src="../assets/posters/need-somewhere-to-practice.png" alt="need-somewhere-to-practice.png" style="width:100%; height:100%; object-fit:cover; display:block;"/></div><div style="flex:1; height:100%; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.10);"><img src="../assets/posters/cassette-tape-concert.png" alt="cassette-tape-concert.png" style="width:100%; height:100%; object-fit:cover; display:block;"/></div><div style="flex:1; height:100%; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.10);"><img src="../assets/posters/real-book-club.png" alt="real-book-club.png" style="width:100%; height:100%; object-fit:cover; display:block;"/></div>
  </div></div></body>
</html>

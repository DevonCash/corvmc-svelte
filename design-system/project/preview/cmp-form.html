<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Form inputs</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap");
:root {
  --cmc-orange: #e5771e;
  --cmc-yellow: #ffe28a;
  --cmc-goldenrod: #ffb500;
  --cmc-red-orange: #f84d13;
  --cmc-navy: #003b5c;
  --cmc-teal: #00859b;
  --cmc-light-blue: #b8dde1;
  --cmc-brown: #5a3d2b;
  --cmc-cream: #fffbf6;
  --cmc-parchment: #ffe2cd;
  --cmc-aged-paper: #ecdfc4;
  --fg: #1a2330;
  --fg-2: #4a5563;
  --fg-3: #7a8290;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: "Lexend", system-ui, sans-serif;
  background: var(--cmc-cream);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.card {
  padding: 20px 24px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.row { display: flex; gap: 14px; align-items: stretch; }
.tri-stripe {
  height: 10px;
  background: linear-gradient(
    to bottom,
    var(--cmc-teal) 0 33.333%,
    var(--cmc-goldenrod) 33.333% 66.666%,
    var(--cmc-red-orange) 66.666% 100%
  );
}
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
</style>
</head>
<body><div class="card">
  <div style="display:flex; flex-direction:column; gap:12px;">
    <div>
      <label style="display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:var(--fg);">Your name</label>
      <input value="Jordan Park" style="width:100%; padding:10px 12px; border:1.5px solid rgba(0,0,0,0.15); border-radius:8px; font-family:inherit; font-size:14px; background:#fff;" />
    </div>
    <div>
      <label style="display:block; font-size:12px; font-weight:600; margin-bottom:6px; color:var(--fg);">Email</label>
      <input value="contact@corvmc.org" style="width:100%; padding:10px 12px; border:1.5px solid var(--cmc-orange); border-radius:8px; outline:3px solid rgba(229,119,30,0.18); font-family:inherit; font-size:14px; background:#fff;" />
      <div style="font-size:11px; color:var(--fg-3); margin-top:4px;">Focused — orange 1.5px border + soft ring</div>
    </div>
  </div></div></body>
</html>

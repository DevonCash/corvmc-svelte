<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Primary speaker mark</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap");
:root { --fg:#1a2330; --fg-2:#4a5563; --fg-3:#7a8290; }
* { box-sizing: border-box; }
html, body { margin:0; padding:0; font-family:"Lexend",system-ui,sans-serif; background:#fffbf6; color:var(--fg); -webkit-font-smoothing: antialiased; }
.card { padding: 20px 24px; height: 100vh; display: flex; flex-direction: column; gap: 14px; }
.label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); }
</style>
</head>
<body>
<div class="card">
  <div style="flex:1; display:flex; align-items:center; justify-content:center; gap:36px; padding:8px;">
    <img src="../assets/logos/cmc-speaker.png" alt="CMC speaker mark" style="height: 130px; width:auto;"/>
    <div style="display:flex; flex-direction:column; gap:6px; max-width:280px;">
      <div style="font-weight:700; font-size:18px;">Speaker mark</div>
      <div style="font-size:12px; color:var(--fg-2); line-height:1.5;">The current CMC mascot — speaker cabinet with sound lines, no enclosing circle, no lettering on the side. Include on most marketing surfaces.</div>
      <div class="label" style="margin-top:4px;">cmc-speaker.png</div>
    </div>
  </div>
</div>
</body>
</html>

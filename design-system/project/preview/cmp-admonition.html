<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Admonitions</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Permanent+Marker&display=swap");
:root {
  --cmc-orange: #e5771e;
  --cmc-navy: #003b5c;
  --cmc-teal: #00859b;
  --cmc-light-blue: #b8dde1;
  --cmc-yellow: #ffe28a;
  --cmc-goldenrod: #ffb500;
  --cmc-red-orange: #f84d13;
  --cmc-cream: #fffbf6;
  --cmc-parchment: #ffe2cd;
  --cmc-brown: #5a3d2b;
  --fg: #1a2330;
  --fg-2: #4a5563;
  --fg-3: #7a8290;
}
* { box-sizing: border-box; }
html, body {
  margin:0; padding:0;
  font-family:"Lexend", system-ui, sans-serif;
  background: var(--cmc-cream);
  color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
.card { padding: 24px 28px; min-height: 100vh; display: flex; flex-direction: column; gap: 18px; }
.label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}

/* Paper-tape admonition style — flat, no stripe overlay, no offset shadow.
   Chalkpen title uses Permanent Marker. */
.alert {
  position: relative;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  padding: 14px 18px 14px 16px;
  font-size: 14px;
  line-height: 1.5;
  border-radius: 2px;
  background: var(--alert-tape-color);
  color: var(--alert-tape-text);
  transform: rotate(var(--alert-tilt, -0.6deg));
  margin-block: 6px;
}
.alert svg { flex-shrink: 0; margin-top: 1px; opacity: 0.85; }
.alert strong {
  display: inline-block;
  margin-right: 6px;
  font-family: "Permanent Marker", "Lexend", sans-serif;
  font-weight: 400;
  font-size: 17px;
  letter-spacing: 0.02em;
  line-height: 1;
  text-transform: uppercase;
  color: inherit;
  transform: rotate(-1deg);
  vertical-align: -1px;
}

.alert--note {
  --alert-tape-color: rgba(184, 221, 225, 0.92);
  --alert-tape-text: var(--cmc-navy);
  --alert-tilt: -0.6deg;
}
.alert--tip {
  --alert-tape-color: rgba(255, 226, 138, 0.92);
  --alert-tape-text: var(--cmc-brown);
  --alert-tilt: 0.5deg;
}
.alert--important {
  --alert-tape-color: rgba(248, 77, 19, 0.85);
  --alert-tape-text: #fff;
  --alert-tilt: -0.8deg;
}
.alert--warning {
  --alert-tape-color: rgba(255, 181, 0, 0.85);
  --alert-tape-text: var(--cmc-brown);
  --alert-tilt: 0.4deg;
}
</style>
</head>
<body>
<div class="card">
  <div class="label">.alert — washi paper-tape style · slight tilt · chalkpen title</div>

  <div class="alert alert--note">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12.01" y2="8"/><polyline points="11 12 12 12 12 16 13 16"/></svg>
    <div><strong>Note</strong> &nbsp; Practice space access requires a free CMC membership.</div>
  </div>

  <div class="alert alert--tip">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.5-.5-2-1-3-1.25-2.5.5-5 2.5-5 3 0 6 4 6 8a6 6 0 0 1-12 0c0-1.5.5-3 1-4"/></svg>
    <div><strong>Tip</strong> &nbsp; Bring your instrument and a Real Book (or we'll share!)</div>
  </div>

  <div class="alert alert--important">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <div><strong>Important</strong> &nbsp; All ages · NOTAFLOF · doors at 6:30 PM.</div>
  </div>

  <div class="alert alert--warning">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
    <div><strong>Warning</strong> &nbsp; PA volume capped at 11 PM on weeknights.</div>
  </div>
</div>
</body>
</html>
